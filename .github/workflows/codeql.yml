name: CodeQL

on:
  push:
    branches:
      - master
    paths-ignore:
      - '**/*.md'
  pull_request:
    branches:
      - master
    paths-ignore:
      - '**/*.md'
  schedule:
    - cron: "39 17 * * 3"

jobs:
  analyze:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    env:
      # Let's try opting into use of Nodejs v24; see:
      #  https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
      # GitHub runners still causing problems with NodeJS v20; see:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    strategy:
      fail-fast: true
      matrix:
        language:
          - cpp

    steps:
      - name: Checkout ProFTPD
        uses: actions/checkout@v6
        with:
          repository: proftpd/proftpd

      - name: Checkout mod_prometheus
        uses: actions/checkout@v6
        with:
          path: contrib/mod_prometheus

      - name: Install Packages
        run: |
          sudo apt-get update
          sudo apt-get install --yes libmicrohttpd-dev libsqlite3-dev zlib1g-dev

      - name: Configure
        run: |
          ./configure --with-modules=mod_prometheus

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          config-file: contrib/mod_prometheus/.codeql.yml
          queries: +security-and-quality
          source-root: contrib/mod_prometheus

      - name: Build
        run: |
          make

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
          checkout_path: contrib/mod_prometheus
          output: sarif-results
          upload: false

      - name: Upload CodeQL SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          checkout_path: contrib/mod_prometheus
          sarif_file: "sarif-results/${{ matrix.language }}.sarif"
